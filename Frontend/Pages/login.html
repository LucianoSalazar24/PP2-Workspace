<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - FutbolReservas</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/login.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="login-body">
    <!-- Fondo de cancha de fútbol -->
    <div class="login-background"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <span class="logo-icon-large">⚽</span>
                    <h1>FutbolReservas</h1>
                </div>
                <p class="login-subtitle">Sistema de Reservas de Canchas</p>
            </div>

            <!-- Pestañas de Login/Registro -->
            <div class="login-tabs">
                <button class="tab-btn active" data-tab="login">Iniciar Sesión</button>
                <button class="tab-btn" data-tab="registro">Crear Cuenta</button>
            </div>

            <!-- Formulario de Login -->
            <div id="loginTab" class="tab-content active">
                <form id="formLogin" class="auth-form">
                    <div class="form-group">
                        <label class="form-label" for="loginEmail">
                            <span class="input-icon">📧</span>
                            Email
                        </label>
                        <input type="email" id="loginEmail" class="form-input" 
                               placeholder="tu@email.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="loginPassword">
                            <span class="input-icon">🔒</span>
                            Contraseña
                        </label>
                        <input type="password" id="loginPassword" class="form-input" 
                               placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block btn-large">
                        Iniciar Sesión
                    </button>

                    <div class="form-footer">
                        <a href="#" class="link-text">¿Olvidaste tu contraseña?</a>
                    </div>
                </form>
            </div>

            <!-- Formulario de Registro -->
            <div id="registroTab" class="tab-content">
                <form id="formRegistro" class="auth-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label required" for="regNombre">Nombre</label>
                            <input type="text" id="regNombre" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label required" for="regApellido">Apellido</label>
                            <input type="text" id="regApellido" class="form-input" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label required" for="regEmail">Email</label>
                        <input type="email" id="regEmail" class="form-input" 
                               placeholder="tu@email.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label required" for="regTelefono">Teléfono</label>
                        <input type="tel" id="regTelefono" class="form-input" 
                               placeholder="1123456789" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label required" for="regPassword">Contraseña</label>
                        <input type="password" id="regPassword" class="form-input" 
                               placeholder="Mínimo 6 caracteres" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label required" for="regPasswordConfirm">
                            Confirmar Contraseña
                        </label>
                        <input type="password" id="regPasswordConfirm" class="form-input" 
                               placeholder="Repite tu contraseña" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block btn-large">
                        Crear Cuenta
                    </button>
                </form>
            </div>

            <div class="login-footer">
                <a href="../index.html" class="link-text">← Volver al inicio</a>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
