<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - FutbolReservas</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">⚽</span>
                <h1>FutbolReservas - Admin</h1>
            </div>
            <nav class="nav">
                <a href="../index.html" class="nav-link">Inicio</a>
                <a href="reservar.html" class="nav-link">Reservar</a>
                <a href="mis-reservas.html" class="nav-link">Mis Reservas</a>
                <a href="admin.html" class="nav-link active">Panel Admin</a>
                <button onclick="cerrarSesion()" class="btn btn-outline" style="margin-left: 1rem;">
                    Cerrar Sesión
                </button>
            </nav>
        </div>
    </header>

    <div class="admin-container">
        <aside class="admin-sidebar">
            <nav class="admin-nav">
                <button class="admin-nav-btn active" data-section="dashboard">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </button>
                <button class="admin-nav-btn" data-section="reservas">
                    <span class="icon">📅</span>
                    <span>Reservas</span>
                </button>
                <button class="admin-nav-btn" data-section="clientes">
                    <span class="icon">👤</span>
                    <span>Clientes</span>
                </button>
                <button class="admin-nav-btn" data-section="canchas">
                    <span class="icon">🏟️</span>
                    <span>Canchas</span>
                </button>
            </nav>
        </aside>

        <main class="admin-content">
            <!-- Dashboard -->
            <section id="dashboard" class="admin-section active">
                <h2>Dashboard</h2>
                
                <div id="alertasDashboardContainer"></div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">📅</div>
                        <div class="stat-info">
                            <h3 id="statReservasHoy">-</h3>
                            <p>Reservas Hoy</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">💰</div>
                        <div class="stat-info">
                            <h3 id="statIngresosMes">-</h3>
                            <p>Ingresos del Mes</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">👥</div>
                        <div class="stat-info">
                            <h3 id="statClientes">-</h3>
                            <p>Total Clientes</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">✅</div>
                        <div class="stat-info">
                            <h3 id="statOcupacion">-</h3>
                            <p>Ocupación Hoy</p>
                        </div>
                    </div>
                </div>

                <div class="card mt-4">
                    <div class="card-header">
                        <h3>Reservas de Hoy</h3>
                    </div>
                    <div class="card-body">
                        <div id="reservasHoyContainer">
                            <div class="loader-container">
                                <div class="spinner"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Reservas -->
            <section id="reservas" class="admin-section">
                <div class="section-header">
                    <h2>Gestión de Reservas</h2>
                </div>

                <!-- Pestañas internas de Reservas -->
                <div class="internal-tabs">
                    <button class="tab-btn active" data-tab="todas-reservas">Todas las Reservas</button>
                    <button class="tab-btn" data-tab="futuras-reservas">🔮 Próximas Reservas (Futuras)</button>
                </div>

                <!-- Contenido: Todas las Reservas -->
                <div id="todas-reservas" class="tab-pane active">
                    <div class="card">
                        <div class="card-body">
                            <div class="filters-row">
                                <div class="filter-group">
                                    <label for="filtroFecha">📅 Buscar por Fecha:</label>
                                    <input type="date" id="filtroFecha" class="form-input">
                                </div>
                                <div class="filter-group">
                                    <label for="filtroEstado">🚥 Estado:</label>
                                    <select id="filtroEstado" class="form-select">
                                        <option value="">Todos los estados</option>
                                        <option value="pendiente">Pendiente</option>
                                        <option value="confirmada">Confirmada</option>
                                        <option value="cancelada">Cancelada</option>
                                        <option value="completada">Completada</option>
                                        <option value="no_show">No Show</option>
                                    </select>
                                </div>
                                <div class="filter-group">
                                    <label for="filtroCliente">👤 Buscar por Cliente:</label>
                                    <input type="text" id="filtroCliente" class="form-input" 
                                           placeholder="Nombre, apellido o Tel...">
                                </div>
                                <button id="btnFiltrarReservas" class="btn btn-primary">
                                    🔍 BUSCAR
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="card mt-3">
                        <div class="card-body">
                            <div id="reservasTableContainer">
                                <div class="loader-container">
                                    <div class="spinner"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Contenido: Reservas Futuras -->
                <div id="futuras-reservas" class="tab-pane">
                    <div class="card">
                        <div class="card-body">
                            <div id="reservasFuturasContainer">
                                <div class="loader-container">
                                    <div class="spinner"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Clientes -->
            <section id="clientes" class="admin-section">
                <div class="section-header">
                    <h2>Gestión de Clientes</h2>
                </div>

                <div class="card">
                    <div class="card-body">
                        <input type="text" id="buscarCliente" class="form-input" 
                               placeholder="Buscar por nombre, teléfono o email...">
                    </div>
                </div>

                <div class="card mt-3">
                    <div class="card-body">
                        <div id="clientesTableContainer">
                            <div class="loader-container">
                                <div class="spinner"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Canchas -->
            <section id="canchas" class="admin-section">
                <div class="section-header">
                    <h2>Gestión de Canchas</h2>
                </div>

                <div class="canchas-grid-admin" id="canchasAdminContainer">
                    <div class="loader-container">
                        <div class="spinner"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        // Verificar que sea admin antes de cargar la página
        const sesion = sessionStorage.getItem('sesion');
        if (!sesion) {
            alert('Debes iniciar sesión');
            window.location.href = 'login.html';
        } else {
            const sesionObj = JSON.parse(sesion);
            if (sesionObj.rol !== 'admin') {
                alert('No tienes permisos de administrador');
                window.location.href = '../index.html';
            }
        }
    </script>
    <script src="../js/admin.js"></script>
</body>
</html>
